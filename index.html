    <section class="hero">
        <h1>예측이 어려우면,<br>기민하게 대응하자.</h1>
        <p>코딩과 기술, 그리고 성장의 기록</p>
    </section>

    <!-- Lecture Section -->
    <section id="lecture">
        <h2>Lecture</h2>
        <p>지식과 경험을 나누는 시간</p>
        <div class="card-container"
            style="background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden;">
            <iframe
                src="https://weak-particle-016.notion.site/ebd//2c9db03ea0358038844ffa7d1069ccec?v=2c9db03ea03580f5aa62000c4c40a15f"
                width="100%" height="600" frameborder="0" allowfullscreen></iframe>
        </div>
    </section>

    <section id="archive">
        <h2>Archive</h2>
        <p>회고와 인사이트</p>

        <!-- Tab Navigation -->
        <div class="iframe-tabs">
            <button class="tab-btn active" onclick="changeArchiveTab(this, '')">Milestones</button>
            <button class="tab-btn" onclick="changeArchiveTab(this, '')">Retrospectives</button>
            <button class="tab-btn" onclick="changeArchiveTab(this, '')">Insights</button>
        </div>

        <div id="archive-content" class="card-container"
            style="min-height: 400px; display: flex; align-items: center; justify-content: center; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color);">
            <!-- Iframe will be injected here when link is available -->
            <div style="text-align: center; padding: 2rem;">
                <h3 style="color: var(--text-secondary); margin-bottom: 1rem;">Content Coming Soon</h3>
                <p>이 섹션은 현재 준비 중입니다.<br>곧 채워질 예정이니 기대해주세요!</p>
            </div>
        </div>

        <script>
            function changeArchiveTab(btn, url) {
                // Update Button Styles
                var buttons = btn.parentElement.getElementsByClassName('tab-btn');
                for (var i = 0; i < buttons.length; i++) {
                    buttons[i].classList.remove('active');
                }
                btn.classList.add('active');

                // Update Content
                var contentDiv = document.getElementById('archive-content');

                if (url) {
                    // If URL exists, show iframe
                    contentDiv.innerHTML = '<iframe src="' + url + '" width="100%" height="850px" frameborder="0" allowfullscreen style="border-radius: 12px;"></iframe>';
                } else {
                    // If no URL (placeholder), show message
                    contentDiv.innerHTML = `
                        <div style="text-align: center; padding: 2rem;">
                            <h3 style="color: var(--text-secondary); margin-bottom: 1rem;">Coming Soon</h3>
                            <p>${btn.innerText} 섹션은 준비 중입니다.</p>
                        </div>
                    `;
                }
            }
        </script>
    </section>
